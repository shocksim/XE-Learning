<!DOCTYPE html>
<!--
  BART Train Times Widget for iCUE Xeneon Edge
  =============================================
  Shows real-time train departure estimates from any BART station.

  Setup:
    1. Pick your station from the dropdown in iCUE settings OR tap the
       station name directly on the widget to pick in-widget.
    2. (Optional) Enter a BART API key. The default public key works fine
       for personal use: MW9S-E7SL-26DU-VV8V
    3. The widget auto-refreshes every 60s (configurable).

  API: https://api.bart.gov/docs/etd/
  Public key is provided by default — no signup needed.
-->
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>tr('BART Train Times')</title>

	<link rel="icon" type="image/svg+xml" href="images/bartwidget.svg">
	<link rel="stylesheet" type="text/css" href="styles/bartwidget.css">
	<link rel="stylesheet" type="text/css" href="tools/media_editor/MediaEditor.css">
	<script type="text/javascript" src="tools/media_editor/MediaEditor.js"></script>

	<meta name="description" content="Real-time BART departures">
	<meta name="x-icue-interactive">

	<!-- iCUE 5.41+ restrictions -->
	<meta name="x-icue-restrictions"
		  data-restrictions='[
			{ "device": "dashboard_lcd" }
		  ]'>

	<!-- === BART Settings === -->

			'Coliseum|COLS',
			'Colma|COLM',
			'Concord|CONC',
			'Daly City|DALY',

			'Union City|UCTY',
			'Walnut Creek|WCRK',

	<meta name="x-icue-property" content="direction"

	<meta name="x-icue-property" content="bartApiKey"
		  data-label="tr('BART API Key (optional)')"
		  data-type="textfield"

	<!-- Background: media-selector for local image files -->

		  data-label="tr('Accent Color')"
		  data-type="color"

		  data-label="tr('Background Color')"
		  data-type="color"

		  data-label="tr('Background Transparency')"
		  data-type="slider"
		  data-default="85"
		  data-min="0"
		  data-max="100"
		  data-step="1">

	<!-- === Groups === -->
	<script id="x-icue-groups" type="application/json">
	[
		{
			"title": "tr('BART Settings')",
			"properties": [
				"station",
				"direction",
				"maxTrains",
				"refreshInterval",
				"bartApiKey"
			]
		},
		{
			"title": "tr('Widget Personalization')",
			"properties": [
				"backgroundImage",
				"glassBlur",
				"bgBrightness",
				"textColor",
				"accentColor",
				"backgroundColor",
				"transparency"
			]
		}
	]
	</script>
</head>

<body>
	<div class="widget" id="root">
		<div class="widget-background" aria-hidden="true">
			<div class="bg-layer" id="media-background"></div>
		</div>
		<div class="surface"></div>

		<!-- Overlay for errors / loading gate -->
		<div class="overlay" id="overlay" aria-live="polite">
			<div class="overlay-card">
				<div class="spinner" id="overlaySpinner"></div>
				<div class="overlay-title" id="overlayTitle">Loading...</div>
				<div class="overlay-sub" id="overlaySub">Preparing widget.</div>
				<div class="overlay-actions">
					<button class="btn primary" id="overlayReloadBtn" type="button">Reload</button>
				</div>
			</div>
		</div>

		<div class="content">
			<!-- Header: Station name + live status -->
			<div class="header">
				<div class="header-left" id="headerLeft">
					<span class="label-small">BART Departures</span>
					<div class="station-name" id="stationName">Embarcadero</div>
					<!-- In-widget station selector dropdown -->
					<div class="station-dropdown" id="stationDropdown"></div>
				</div>
				<div class="header-right">
					<div class="live-badge" id="liveBadge">
						<span class="dot"></span>
						<span id="liveBadgeText">DEMO</span>
					</div>
					<span class="direction-label" id="directionLabel">All Directions</span>
				</div>
			</div>

			<div class="divider"></div>

			<!-- Train departure cards -->
			<div class="train-list" id="trainContainer"></div>

			<!-- Footer: timestamp only -->
			<div class="footer">
				<span class="last-updated" id="lastUpdated"></span>
			</div>
		</div>
	</div>

	<script>
		/* ============================================================
		   BART Train Times Widget — Logic
		   ============================================================ */

		// --- iCUE Event Bridge ---
		icueEvents = {
			'onDataUpdated': onIcueDataUpdated,
			'onICUEInitialized': onIcueInitialized
		};

		// --- Constants ---
		const DEFAULT_API_KEY = 'MW9S-E7SL-26DU-VV8V';

		const LINE_COLORS = {
			'BLUE':   '#009BDA',
			'RED':    '#ED1C24',
			'ORANGE': '#F58220',
			'YELLOW': '#FFE800',
			'GREEN':  '#4DB848',
			'PURPLE': '#7D4791',
			'BEIGE':  '#D5A87A',
			'WHITE':  '#FFFFFF'
		};

		// All BART stations for the in-widget dropdown
		const ALL_STATIONS = [
			{ name: '12th St. Oakland City Center', abbr: '12TH' },
			{ name: '16th St. Mission', abbr: '16TH' },
			{ name: '19th St. Oakland', abbr: '19TH' },
			{ name: '24th St. Mission', abbr: '24TH' },
			{ name: 'Antioch', abbr: 'ANTC' },
			{ name: 'Ashby', abbr: 'ASHB' },
			{ name: 'Balboa Park', abbr: 'BALB' },
			{ name: 'Bay Fair', abbr: 'BAYF' },
			{ name: 'Berryessa', abbr: 'BERY' },
			{ name: 'Castro Valley', abbr: 'CAST' },
			{ name: 'Civic Center', abbr: 'CIVC' },
			{ name: 'Coliseum', abbr: 'COLS' },
			{ name: 'Colma', abbr: 'COLM' },
			{ name: 'Concord', abbr: 'CONC' },
			{ name: 'Daly City', abbr: 'DALY' },
			{ name: 'Downtown Berkeley', abbr: 'DBRK' },
			{ name: 'Dublin/Pleasanton', abbr: 'DUBL' },
			{ name: 'El Cerrito del Norte', abbr: 'DELN' },
			{ name: 'El Cerrito Plaza', abbr: 'PLZA' },
			{ name: 'Embarcadero', abbr: 'EMBR' },
			{ name: 'Fremont', abbr: 'FRMT' },
			{ name: 'Fruitvale', abbr: 'FTVL' },
			{ name: 'Glen Park', abbr: 'GLEN' },
			{ name: 'Hayward', abbr: 'HAYW' },
			{ name: 'Lafayette', abbr: 'LAFY' },
			{ name: 'Lake Merritt', abbr: 'LAKE' },
			{ name: 'MacArthur', abbr: 'MCAR' },
			{ name: 'Milpitas', abbr: 'MLPT' },
			{ name: 'Montgomery St.', abbr: 'MONT' },
			{ name: 'North Berkeley', abbr: 'NBRK' },
			{ name: 'North Concord', abbr: 'NCON' },
			{ name: 'Oakland Intl Airport', abbr: 'OAKL' },
			{ name: 'Orinda', abbr: 'ORIN' },
			{ name: 'Pittsburg/Bay Point', abbr: 'PITT' },
			{ name: 'Pittsburg Center', abbr: 'PCTR' },
			{ name: 'Pleasant Hill', abbr: 'PHIL' },
			{ name: 'Powell St.', abbr: 'POWL' },
			{ name: 'Richmond', abbr: 'RICH' },
			{ name: 'Rockridge', abbr: 'ROCK' },
			{ name: 'San Bruno', abbr: 'SBRN' },
			{ name: 'SFO Airport', abbr: 'SFIA' },
			{ name: 'San Leandro', abbr: 'SANL' },
			{ name: 'South Hayward', abbr: 'SHAY' },
			{ name: 'South San Francisco', abbr: 'SSAN' },
			{ name: 'Union City', abbr: 'UCTY' },
			{ name: 'Walnut Creek', abbr: 'WCRK' },
			{ name: 'Warm Springs', abbr: 'WARM' },
			{ name: 'West Dublin/Pleasanton', abbr: 'WDUB' },
			{ name: 'West Oakland', abbr: 'WOAK' }
		];

		// --- State ---
		let refreshTimer = null;
		let isLoading = false;
		let lastRenderedKey = '';  // Cache key to avoid redundant DOM rebuilds
		let dropdownOpen = false;
		let inWidgetStation = null; // Override from in-widget selector

		// Unique storage key per widget instance
		const STORAGE_KEY = (typeof uniqueId !== 'undefined' && uniqueId)
			? 'bart_' + uniqueId : 'bart_default';

		// --- DOM Refs ---
		const overlay = document.getElementById('overlay');
		const overlaySpinner = document.getElementById('overlaySpinner');
		const overlayTitle = document.getElementById('overlayTitle');
		const overlaySub = document.getElementById('overlaySub');
		const overlayReloadBtn = document.getElementById('overlayReloadBtn');
		const trainContainer = document.getElementById('trainContainer');
		const stationNameEl = document.getElementById('stationName');
		const liveBadge = document.getElementById('liveBadge');
		const liveBadgeText = document.getElementById('liveBadgeText');
		const directionLabel = document.getElementById('directionLabel');
		const lastUpdatedEl = document.getElementById('lastUpdated');
		const bgLayer = document.getElementById('media-background');
		const mediaBackgroundComponent = createMediaBackgroundComponent(bgLayer);
		const headerLeft = document.getElementById('headerLeft');
		const stationDropdown = document.getElementById('stationDropdown');

		// --- iCUE Helpers ---

		function getIcueProperty(name) {
			if (typeof window !== 'undefined' && Object.prototype.hasOwnProperty.call(window, name)) {
				const value = window[name];
				if (value !== undefined && value !== null && value !== '') return value;
			}
			try {
				const value = Function(`return typeof ${name} !== 'undefined' ? ${name} : undefined`)();
				if (value !== undefined && value !== null && value !== '') return value;
			} catch (e) {}
			return undefined;
		}

		function clampInt(n, min, max, fallback) {
			const v = Number(n);
			if (!Number.isFinite(v)) return fallback;
			return Math.min(Math.max(Math.round(v), min), max);
		}

		function resolveMediaPath(value) {
			if (!value) return '';
			if (typeof value === 'string') return value;
			if (value.pathToAsset) return value.pathToAsset;
			if (value.path) return value.path;
			if (value.value) return value.value;
			return '';
		}

		function createMediaBackgroundComponent(container) {
			if (!container) {
				return {
					clear: function() {},
					loadMedia: function() {}
				};
			}

			if (typeof MediaEditor === 'function') {
				return new MediaEditor({
					container: container,
					onMediaLoaded: function() {
						container.style.display = 'block';
					},
					onMediaError: function(error) {
						console.error('Media background error:', error);
					}
				});
			}

			console.warn('MediaEditor is unavailable; using static background fallback.');
			return {
				clear: function() {
					container.style.backgroundImage = '';
					container.style.display = 'none';
				},
				loadMedia: function(config) {
					const assetPath = resolveMediaPath(config ? (config.pathToAsset || config.path) : '');
					if (!assetPath) {
						container.style.backgroundImage = '';
						container.style.display = 'none';
						return;
					}

					container.style.backgroundImage = "url('" + assetPath + "')";
					container.style.backgroundRepeat = 'no-repeat';
					container.style.backgroundPosition = 'center';
					container.style.backgroundSize = 'cover';
					container.style.display = 'block';
				}
			};
		}

		function hexToRgb(hex) {
			if (!hex || typeof hex !== 'string') return { r: 0, g: 0, b: 0 };
			const h = hex.trim().replace('#', '');
			if (h.length === 3) {
				return {
					r: parseInt(h[0] + h[0], 16) || 0,
					g: parseInt(h[1] + h[1], 16) || 0,
					b: parseInt(h[2] + h[2], 16) || 0
				};
			}
			if (h.length === 6) {
				return {
					r: parseInt(h.slice(0, 2), 16) || 0,
					g: parseInt(h.slice(2, 4), 16) || 0,
					b: parseInt(h.slice(4, 6), 16) || 0
				};
			}
			return { r: 0, g: 0, b: 0 };
		}

		/**
		 * Get the active station — in-widget override takes priority,
		 * then falls back to iCUE combobox value.
		 */
		function getActiveStation() {
			if (inWidgetStation) return inWidgetStation;
			return parseStation(getIcueProperty('station'));
		}

		function parseStation(value) {
			const raw = value || 'Embarcadero|EMBR';
			const parts = raw.split('|');
			return {
				name: parts[0] || 'Embarcadero',
				abbr: parts[1] || 'EMBR'
			};
		}

		// --- Persistence ---
		function loadSavedStation() {
			try {
				const saved = localStorage.getItem(STORAGE_KEY + '_station');
				if (saved) {
					const parsed = JSON.parse(saved);
					if (parsed && parsed.abbr) {
						inWidgetStation = parsed;
					}
				}
			} catch (e) {}
		}

		function saveStation(station) {
			try {
				localStorage.setItem(STORAGE_KEY + '_station', JSON.stringify(station));
			} catch (e) {}
		}

		// --- Style Application ---

		function updateStyles() {
			const root = document.getElementById('root');
			if (!root) return;

			const textColor = getIcueProperty('textColor') || '#ffffff';
			const accentColor = getIcueProperty('accentColor') || '#009BDA';
			const bgColor = getIcueProperty('backgroundColor') || '#0a0e14';
			const opacityPct = clampInt(getIcueProperty('transparency'), 0, 100, 85);
			const alpha = opacityPct / 100;

			const accentRgb = hexToRgb(accentColor);
			const bgRgb = hexToRgb(bgColor);

			// Batch all CSS variable updates on root
			const style = root.style;
			style.setProperty('--text-color', textColor);
			style.setProperty('--accent-color', accentColor);
			style.setProperty('--accent-r', String(accentRgb.r));
			style.setProperty('--accent-g', String(accentRgb.g));
			style.setProperty('--accent-b', String(accentRgb.b));
			style.setProperty('--bg-r', String(bgRgb.r));
			style.setProperty('--bg-g', String(bgRgb.g));
			style.setProperty('--bg-b', String(bgRgb.b));
			style.setProperty('--bg-alpha', String(alpha));

			// Blur + brightness applied directly to the bg image layer (not as backdrop-filter)
			const blur = clampInt(getIcueProperty('glassBlur'), 0, 40, 20);
			const brightness = clampInt(getIcueProperty('bgBrightness'), 0, 100, 35);
			style.setProperty('--bg-blur', blur + 'px');
			style.setProperty('--bg-brightness', brightness + '%');

			const bgMedia = getIcueProperty('backgroundImage');
			const mediaPath = resolveMediaPath(bgMedia);
			if (typeof bgMedia === 'undefined' || !mediaPath) {
				mediaBackgroundComponent.clear();
			} else {
				const mediaConfig = (bgMedia && typeof bgMedia === 'object')
					? { ...bgMedia }
					: { pathToAsset: mediaPath };

				if (!mediaConfig.pathToAsset) mediaConfig.pathToAsset = mediaPath;
				if (!mediaConfig.path) mediaConfig.path = mediaConfig.pathToAsset;

				mediaBackgroundComponent.loadMedia(mediaConfig);
			}

			// Update header
			const station = getActiveStation();
			stationNameEl.textContent = station.name;

			const dir = getIcueProperty('direction') || 'All';
			directionLabel.textContent = dir === 'All' ? 'All Directions' : dir + 'bound';
		}

		// --- Overlay Helpers ---

		function showOverlay(title, sub, showBtn = true, showSpinner = false) {
			overlayTitle.textContent = title;
			overlaySub.textContent = sub;
			overlaySpinner.style.display = showSpinner ? 'block' : 'none';
			overlayReloadBtn.style.display = showBtn ? 'inline-flex' : 'none';
			overlay.classList.add('visible');
		}

		function hideOverlay() {
			overlay.classList.remove('visible');
		}

		// --- Station Dropdown ---

		function buildDropdown() {
			const frag = document.createDocumentFragment();
			ALL_STATIONS.forEach(s => {
				const el = document.createElement('div');
				el.className = 'station-option';
				el.textContent = s.name;
				el.dataset.abbr = s.abbr;
				frag.appendChild(el);
			});
			stationDropdown.innerHTML = '';
			stationDropdown.appendChild(frag);
		}

		// Event delegation for station options
		stationDropdown.addEventListener('click', (e) => {
			const option = e.target.closest('.station-option');
			if (!option) return;
			e.stopPropagation();
			const abbr = option.dataset.abbr;
			const match = ALL_STATIONS.find(s => s.abbr === abbr);
			if (match) {
				inWidgetStation = { name: match.name, abbr: match.abbr };
				saveStation(inWidgetStation);
				closeDropdown();
				updateStyles();
				refresh();
			}
		});

		stationNameEl.addEventListener('click', (e) => {
			e.stopPropagation();
			if (dropdownOpen) {
				closeDropdown();
			} else {
				openDropdown();
			}
		});

		function openDropdown() {
			dropdownOpen = true;
			stationDropdown.classList.add('open');
			const active = getActiveStation();
			const el = stationDropdown.querySelector(`[data-abbr="${active.abbr}"]`);
			if (el) {
				el.classList.add('active');
				el.scrollIntoView({ block: 'center', behavior: 'instant' });
			}
		}

		function closeDropdown() {
			dropdownOpen = false;
			stationDropdown.classList.remove('open');
			const prev = stationDropdown.querySelector('.active');
			if (prev) prev.classList.remove('active');
		}

		document.addEventListener('click', (e) => {
			if (dropdownOpen && !headerLeft.contains(e.target)) {
				closeDropdown();
			}
		});

		// --- BART API ---

		async function fetchDepartures() {
			const station = getActiveStation();
			const apiKey = getIcueProperty('bartApiKey') || DEFAULT_API_KEY;
			const direction = getIcueProperty('direction') || 'All';

			const dirParam = direction === 'All' ? '' : `&dir=${direction === 'North' ? 'n' : 's'}`;
			const url = `https://api.bart.gov/api/etd.aspx?cmd=etd&orig=${station.abbr}&key=${encodeURIComponent(apiKey)}&json=y${dirParam}`;

			const response = await fetch(url);
			if (!response.ok) throw new Error(`HTTP ${response.status}`);
			return response.json();
		}

		function parseDepartures(data) {
			const departures = [];
			if (!data || !data.root || !data.root.station) return departures;

			const stations = data.root.station;
			const stationData = Array.isArray(stations) ? stations[0] : stations;
			if (!stationData || !stationData.etd) return departures;

			const etds = Array.isArray(stationData.etd) ? stationData.etd : [stationData.etd];

			for (const etd of etds) {
				const dest = etd.destination || 'Unknown';
				const estimates = Array.isArray(etd.estimate) ? etd.estimate : [etd.estimate];

				for (const est of estimates) {
					if (!est) continue;
					const mins = est.minutes;
					const minuteVal = mins === 'Leaving' ? 0 : parseInt(mins, 10);
					if (isNaN(minuteVal)) continue;

					const colorName = (est.color || '').toUpperCase();
					departures.push({
						dest,
						color: colorName,
						minutes: minuteVal,
						platform: est.platform || '',
						direction: est.direction || '',
						lineColor: LINE_COLORS[colorName] || '#009BDA',
						isLeaving: mins === 'Leaving'
					});
				}
			}

			departures.sort((a, b) => a.minutes - b.minutes);
			return departures;
		}

		// --- Rendering (Performance-optimized) ---

		/**
		 * Cache key from departures — skip DOM rebuild when data is identical.
		 */
		function departureKey(departures, max) {
			return departures.slice(0, max).map(t =>
				`${t.dest}|${t.color}|${t.minutes}|${t.platform}|${t.isLeaving}`
			).join(';');
		}

		function buildTrainCard(train) {
			const card = document.createElement('div');
			card.className = 'train-card';

			const lineName = train.color
				? train.color.charAt(0) + train.color.slice(1).toLowerCase() + ' Line'
				: 'BART';
			const platformText = train.platform ? `Platform ${train.platform}` : '';

			let timeHtml;
			if (train.isLeaving || train.minutes === 0) {
				timeHtml = `<div class="badge-arriving" style="background:${train.lineColor}">NOW</div>`;
			} else if (train.minutes <= 1) {
				timeHtml = `<div class="badge-arriving" style="background:${train.lineColor}">1 MIN</div>`;
			} else {
				timeHtml = `<div class="train-time"><div class="time-value">${train.minutes}</div><div class="time-unit">MIN</div></div>`;
			}

			card.innerHTML =
				`<div class="line-bar" style="background:${train.lineColor}"></div>` +
				`<div class="train-info">` +
					`<div class="train-dest">${train.dest}</div>` +
					`<div class="train-line">${lineName}</div>` +
					(platformText ? `<div class="train-platform">${platformText}</div>` : '') +
				`</div>` +
				timeHtml;

			return card;
		}

		function renderTrains(departures) {
			const maxTrains = clampInt(getIcueProperty('maxTrains'), 2, 10, 5);
			const key = departureKey(departures, maxTrains);

			if (key === lastRenderedKey) return;
			lastRenderedKey = key;

			if (departures.length === 0) {
				trainContainer.innerHTML =
					'<div class="state-message">' +
						'<div class="msg-title">No Departures</div>' +
						'<div class="msg-sub">No trains currently scheduled</div>' +
					'</div>';
				return;
			}

			const visible = departures.slice(0, maxTrains);
			const frag = document.createDocumentFragment();
			for (const train of visible) {
				frag.appendChild(buildTrainCard(train));
			}

			// Single atomic DOM swap
			trainContainer.replaceChildren(frag);
		}

		// --- Mock Data for Demo Mode ---

		const MOCK_DEPARTURES = [
			{ dest: 'SFO Airport', color: 'YELLOW', minutes: 0, platform: '1', direction: 'South', lineColor: '#FFE800', isLeaving: true },
			{ dest: 'Richmond', color: 'RED', minutes: 3, platform: '2', direction: 'North', lineColor: '#ED1C24', isLeaving: false },
			{ dest: 'Berryessa', color: 'GREEN', minutes: 5, platform: '1', direction: 'South', lineColor: '#4DB848', isLeaving: false },
			{ dest: 'Daly City', color: 'BLUE', minutes: 8, platform: '2', direction: 'South', lineColor: '#009BDA', isLeaving: false },
			{ dest: 'Antioch', color: 'YELLOW', minutes: 12, platform: '1', direction: 'North', lineColor: '#FFE800', isLeaving: false }
		];

		function showDemoData() {
			liveBadge.className = 'live-badge';
			liveBadgeText.textContent = 'DEMO';
			lastRenderedKey = '';
			renderTrains(MOCK_DEPARTURES);
			lastUpdatedEl.textContent = 'Demo Mode';
		}

		// --- Refresh Logic ---

		async function refresh() {
			if (isLoading) return;
			isLoading = true;

			// Show loading spinner only on first load (empty container)
			if (trainContainer.children.length === 0) {
				trainContainer.innerHTML =
					'<div class="state-message">' +
						'<div class="spinner"></div>' +
						'<div class="msg-sub">Loading departures...</div>' +
					'</div>';
			}

			try {
				const data = await fetchDepartures();
				const departures = parseDepartures(data);

				liveBadge.className = 'live-badge live';
				liveBadgeText.textContent = 'LIVE';
				hideOverlay();

				renderTrains(departures);

				const now = new Date();
				lastUpdatedEl.textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

			} catch (err) {
				console.error('BART API error:', err);

				if (trainContainer.querySelectorAll('.train-card').length === 0) {
					showDemoData();
				}

				liveBadge.className = 'live-badge error';
				liveBadgeText.textContent = 'OFFLINE';
				lastUpdatedEl.textContent = 'Connection error';
			} finally {
				isLoading = false;
			}
		}

		function startAutoRefresh() {
			if (refreshTimer) clearInterval(refreshTimer);
			const seconds = clampInt(getIcueProperty('refreshInterval'), 30, 120, 60);
			refreshTimer = setInterval(refresh, seconds * 1000);
		}

		// --- iCUE Lifecycle ---

		overlayReloadBtn.addEventListener('click', () => {
			hideOverlay();
			lastRenderedKey = '';
			refresh();
		});

		function onIcueInitialized() {
			updateStyles();
			onIcueDataUpdated();
		}

		function onIcueDataUpdated() {
			const icueStation = parseStation(getIcueProperty('station'));
			if (inWidgetStation && icueStation.abbr !== inWidgetStation.abbr) {
				const prevIcue = window.__lastIcueStation;
				if (prevIcue && prevIcue !== icueStation.abbr) {
					inWidgetStation = null;
					try { localStorage.removeItem(STORAGE_KEY + '_station'); } catch (e) {}
				}
			}
			window.__lastIcueStation = icueStation.abbr;

			lastRenderedKey = '';
			updateStyles();
			startAutoRefresh();
			refresh();
		}

		// --- Init ---
		loadSavedStation();
		buildDropdown();

		if (typeof iCUE_initialized !== 'undefined' && iCUE_initialized) {
			onIcueInitialized();
		} else {
			updateStyles();
			showDemoData();
			refresh();
			startAutoRefresh();
		}
	</script>
</body>
</html>
