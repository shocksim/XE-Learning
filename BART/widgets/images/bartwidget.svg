<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- BART-inspired train icon -->
  <!-- Outer rounded square background -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="#009BDA"/>

  <!-- Train body -->
  <rect x="16" y="14" width="32" height="28" rx="6" fill="#FFFFFF"/>

  <!-- Window band -->
  <rect x="20" y="18" width="10" height="8" rx="2" fill="#009BDA" opacity="0.8"/>
  <rect x="34" y="18" width="10" height="8" rx="2" fill="#009BDA" opacity="0.8"/>

  <!-- Front detail / nose stripe -->
  <rect x="16" y="30" width="32" height="4" fill="#009BDA" opacity="0.3"/>

  <!-- Door -->
  <rect x="28" y="28" width="8" height="12" rx="1.5" fill="#009BDA" opacity="0.5"/>

  <!-- Wheels / track -->
  <circle cx="22" cy="46" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="42" cy="46" r="3.5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="12" y="48" width="40" height="2" rx="1" fill="#FFFFFF" opacity="0.5"/>

  <!-- Headlights -->
  <circle cx="20" cy="36" r="2" fill="#FFE800"/>
  <circle cx="44" cy="36" r="2" fill="#FFE800"/>
</svg>
